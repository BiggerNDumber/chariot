[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]]
[patches.module]
source = 'nativefs.lua'
before = 'main.lua'
name = 'nativefs'

[[patches]]
[patches.copy]
target = "main.lua"
position = "append"
sources = ["Chariot.lua"]

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "local settings = UIBox_button({button = 'settings', label = {localize('b_settings')}, minw = 5, focus_args = {snap_to = true}})"
position = "after"
payload = "local chariot_settings = UIBox_button_custom({button = 'chariot_config', label = {'Chariot'}, colour = darken(G.C.BLUE, 0.25), shadow = true, text_colour = G.C.ORANGE, minw = 5, focus_args = {snap_to = true}})"
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "local t = create_UIBox_generic_options({ contents = {"
position = "after"
payload = "chariot_settings,"
match_indent = true
